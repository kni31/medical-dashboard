<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>의료비 분석 대시보드</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-locale-ko-latest.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">🌙 다크 모드</button>
    </div>

    <h1>의료비 지출 패턴 분석 대시보드</h1>
    
    <div class="filters">
        <select id="gender"><option value="All">전체 성별</option>{% for g in genders %}<option value="{{ g }}">{{ g }}</option>{% endfor %}</select>
        <select id="region"><option value="All">전체 지역</option>{% for r in regions %}<option value="{{ r }}">{{ r }}</option>{% endfor %}</select>
        <select id="disease"><option value="All">전체 과목</option>{% for d in diseases %}<option value="{{ d }}">{{ d }}</option>{% endfor %}</select>
        <button class="btn-search" onclick="loadDashboard()">데이터 분석하기</button>
    </div>

    <div class="chart-container">
        <div id="age-chart" class="chart-box" style="height: 500px;"></div>
        <div id="disease-chart" class="chart-box" style="height: 500px;"></div>
        <div id="region-chart" class="chart-box" style="height: 600px;"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
