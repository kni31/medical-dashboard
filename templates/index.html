{% extends 'base.html' %}

{% block content %}

    <h1>2024년 의료비 지출 대시보드</h1>
    
    <div class="filters">
        <select id="region"><option value="All">전체 지역</option>{% for r in regions %}<option value="{{ r }}">{{ r }}</option>{% endfor %}</select>
        <div class="filter-box">
            <strong>진료과목 선택</strong>
            <div class="checkbox-grid">
                <label><input type="checkbox" id="disease-all" checked> 전체 과목</label>
                {% for d in diseases %}
                <label><input type="checkbox" class="disease-checkbox" value="{{ d }}" checked> {{ d }}</label>
                {% endfor %}
            </div>
        </div>
        <button class="btn-search" onclick="loadDashboard()">데이터 분석하기</button>
    </div>

    <div id="dashboard-feedback" class="mb-3 text-center text-muted">
        데이터를 불러오는 중입니다...
    </div>

    <div class="chart-container">
        <div id="disease-chart" class="chart-box" style="height: 500px;"></div>
        <div id="age-chart" class="chart-box" style="height: 500px;"></div>
        <div id="region-chart" class="chart-box" style="height: 600px;"></div>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-locale-ko-latest.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}?v=2"></script>

{% endblock %}
