{% extends 'base.html' %}

{% block content %}

<h2>회원가입</h2>

<form method="POST">

    <input type="text" name="username" class="form-control mb-3" placeholder="아이디">

    <input type="password" name="password" class="form-control mb-3" placeholder="비밀번호">

    <button class="btn btn-success">회원가입</button>

</form>

<p class="mt-3">이미 계정이 있나요? <a href="{{ url_for('login') }}">로그인</a></p>

{% endblock %}
