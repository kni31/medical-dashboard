{% extends 'base.html' %}

{% block content %}

<h2>로그인</h2>

<form method="POST">

    <input type="text" name="username" class="form-control mb-3" placeholder="아이디">

    <input type="password" name="password" class="form-control mb-3" placeholder="비밀번호">

    <button class="btn btn-primary">로그인</button>

</form>

<p class="mt-3">아직 계정이 없나요? <a href="{{ url_for('register') }}">회원가입</a></p>

{% endblock %}
